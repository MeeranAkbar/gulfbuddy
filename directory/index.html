<script type="module">
import { sb, initNavAuth, openAuth } from '../shared/auth.js';

window.openAuth = openAuth;

const CATS = [
  {id:'',label:'All Businesses',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>'},
  {id:'interior',label:'Interior Design',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'},
  {id:'construction',label:'Construction',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M2 20h20"/><path d="M6 20V10l6-7 6 7v10"/><path d="M9 20v-5h6v5"/></svg>'},
  {id:'medical',label:'Medical & Health',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'},
  {id:'legal',label:'Legal Services',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'},
  {id:'food',label:'Food & Restaurant',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>'},
  {id:'beauty',label:'Beauty & Salon',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>'},
  {id:'education',label:'Education',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>'},
  {id:'it',label:'IT & Technology',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>'},
  {id:'realestate',label:'Real Estate',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>'},
  {id:'cleaning',label:'Cleaning',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/></svg>'},
  {id:'transport',label:'Transport',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'},
  {id:'finance',label:'Finance',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>'},
  {id:'retail',label:'Retail & Shopping',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>'},
  {id:'other',label:'Other',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>'}
];

const EMIRATES = {
  'Dubai': ['Downtown','Business Bay','Marina','JLT','JBR','DIFC','Deira','Bur Dubai','Jumeirah','Al Barsha','Al Quoz','Karama','Garhoud','Al Safa','Mirdif','Silicon Oasis'],
  'Abu Dhabi': ['Corniche','Khalidiyah','Al Reem','Saadiyat','Yas Island','Mussafah','Hamdan Street','Khalifa City'],
  'Sharjah': ['Al Nahda','Al Majaz','Al Qasba','Industrial Area'],
  'Ajman': ['Al Nuaimia','Al Rashidiya'],
  'Ras Al Khaimah': ['Al Nakheel','Al Qurm'],
  'Fujairah': ['Fujairah City','Dibba'],
  'Umm Al Quwain': ['Umm Al Quwain City']
};

let activeCat = '';

// Build category sidebar
const catList = document.getElementById('catList');
CATS.forEach(c => {
  const el = document.createElement('div');
  el.className = 'cat-item' + (c.id === '' ? ' active' : '');
  el.innerHTML = `<span class="cat-icon">${c.icon}</span><span>${c.label}</span>`;
  el.onclick = () => {
    activeCat = c.id;
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    loadDir();
  };
  catList.appendChild(el);
});

// Build emirate filter
const emEl = document.getElementById('emirateFilter');
Object.keys(EMIRATES).forEach(e => {
  const o = document.createElement('option');
  o.value = e; o.textContent = e;
  emEl.appendChild(o);
});

// Update area filter when emirate changes
emEl.addEventListener('change', () => {
  const em = emEl.value;
  const areaEl = document.getElementById('areaFilter');
  areaEl.innerHTML = '<option value="">All Areas</option>';
  if (em && EMIRATES[em]) {
    EMIRATES[em].forEach(a => {
      const o = document.createElement('option');
      o.value = a; o.textContent = a;
      areaEl.appendChild(o);
    });
  }
  loadDir();
});

async function loadDir() {
  const q = document.getElementById('searchInput').value.trim();
  const em = document.getElementById('emirateFilter').value;
  const area = document.getElementById('areaFilter').value;
  let query = sb.from('directory').select('*').eq('status','active')
    .order('tier', {ascending:false})
    .order('rating', {ascending:false});
  if (activeCat) query = query.eq('category', activeCat);
  if (em) query = query.eq('emirate', em);
  if (area) query = query.eq('area', area);
  if (q) query = query.ilike('business_name', `%${q}%`);
  const { data, error } = await query;
  const grid = document.getElementById('dirGrid');
  if (error || !data?.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--text-muted)">
      No businesses found. <a href="list.html" style="color:var(--gold)">List yours free!</a></div>`;
    return;
  }
  grid.innerHTML = data.map(b => `
    <div class="dir-card ${b.tier}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>${b.tier==='premium' ? '<span class="card-badge badge-premium"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg> Premium</span>' : b.tier==='featured' ? '<span class="card-badge badge-featured"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Featured</span>' : ''}</div>
        <span style="font-size:22px">${getCatIcon(b.category)}</span>
      </div>
      <div class="dir-name">${b.business_name}</div>
      <div class="dir-cat">${b.category ? b.category.charAt(0).toUpperCase()+b.category.slice(1) : ''} • ${b.emirate || ''}${b.area ? ' • '+b.area : ''}</div>
      <div class="dir-desc">${b.description || 'Contact for more information'}</div>
      <div class="dir-footer">
        ${b.phone ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg> ${b.phone}</span>` : ''}
        ${b.area ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${b.area}</span>` : ''}
        ${b.rating > 0 ? `<span style="color:var(--gold)">★ ${b.rating}</span>` : ''}
      </div>
    </div>`).join('');
  const catLabel = activeCat ? CATS.find(c => c.id === activeCat)?.label : 'All Businesses';
  const locLabel = em ? ` in ${em}${area ? ' › '+area : ''}` : '';
  document.getElementById('resultsTitle').textContent = catLabel + locLabel + ` (${data.length})`;
}

window.loadDir = loadDir;
window.goList = async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { openAuth(); return; }
  window.location.href = 'list.html';

<script>
(function(){
  function checkAuthState(){
    var user=localStorage.getItem('gb_user');
    var guest=document.getElementById('navGuest');
    var navUser=document.getElementById('navUser');
    var nameEl=document.getElementById('navUserName');
    if(user){try{
      var u=JSON.parse(user);
      var name=(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0]||'Account';
      if(nameEl)nameEl.textContent='Hi, '+name.split(' ')[0];
      if(guest)guest.style.display='none';
      if(navUser)navUser.style.display='flex';
    }catch(e){}}
    else{if(guest)guest.style.display='flex';if(navUser)navUser.style.display='none';}
  }
  function doSignout(){localStorage.removeItem('gb_token');localStorage.removeItem('gb_user');checkAuthState();}
  window.doSignout=doSignout;
  document.addEventListener('DOMContentLoaded',checkAuthState);
})();
</script>
