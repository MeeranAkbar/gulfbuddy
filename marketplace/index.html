<script src="../shared/gb-ref.js"></script>
<!-- auth handled via module below -->
<script>
const SB='https://chfkssclmdshdcijfzdr.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZmtzc2NsbWRzaGRjaWpmemRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODc2ODUsImV4cCI6MjA4OTE2MzY4NX0.cbJBIgeDRIqFvk3WMmxRoDWo1C73wM44oBDekdcc3sE';
const H={apikey:SK,Authorization:'Bearer '+SK};

const AREAS={Dubai:['Downtown','Marina','JLT','JBR','Jumeirah','Al Barsha','Deira','Bur Dubai','Mirdif','Al Quoz','Karama'],
'Abu Dhabi':['Corniche','Khalidiyah','Al Reem Island','Mussafah','Khalifa City'],
Sharjah:['Al Nahda','Al Majaz','Al Qasba','Al Khan'],Ajman:['Al Nuaimiya','Al Rashidiya'],
RAK:['Al Nakheel','Al Hamra'],Fujairah:['City Centre','Faseel']};

let activeCat='all';

function updateArea(){
  const em=document.getElementById('fEmirate')?.value;
  const sel=document.getElementById('fArea');
  if(!sel)return;
  sel.innerHTML='<option value="">All Areas</option>';
  (AREAS[em]||[]).forEach(a=>sel.innerHTML+=`<option>${a}</option>`);
}

function toggleGroup(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

function selectCat(btn,cat,label){
  document.querySelectorAll('.cs-item,.cs-all').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat=cat;
  console.log('Category selected:',cat);
  buildFilterBar(cat,label);
  loadItems();
}

function buildFilterBar(cat,label){
  const bar=document.getElementById('hFilterBar');
  if(cat==='all'){bar.classList.remove('show');bar.innerHTML='';return;}
  let html='';

  // Emirate — always first
  html+=`<div class="hf"><div class="hf-lbl">Emirate</div>
    <select class="hf-sel" id="fEmirate" onchange="updateArea();loadItems()">
      <option value="">All UAE</option>
      <option>Dubai</option><option>Abu Dhabi</option><option>Sharjah</option>
      <option>Ajman</option><option>RAK</option><option>Fujairah</option>
    </select></div>`;

  // Area — always second
  html+=`<div class="hf"><div class="hf-lbl">Area</div>
    <select class="hf-sel" id="fArea" onchange="loadItems()" style="min-width:120px">
      <option value="">All Areas</option>
    </select></div>`;

  // Condition — for physical items
  if(!['books','free'].includes(cat)){
    html+=`<div class="hf"><div class="hf-lbl">Condition</div>
      <select class="hf-sel" id="fCondition" onchange="loadItems()">
        <option value="">Any</option>
        <option>New</option><option>Like New</option><option>Good</option><option>Fair</option>
      </select></div>`;
  }

  // Price range — for non-free categories
  if(cat!=='free'){
    html+=`<div class="hf"><div class="hf-lbl">Price (AED)</div>
      <div class="hf-range">
        <input class="hf-num" type="number" id="fPriceMin" placeholder="0" oninput="loadItems()">
        <span class="hf-dash">—</span>
        <input class="hf-num" type="number" id="fPriceMax" placeholder="Max" oninput="loadItems()">
      </div></div>`;
  }

  html+=`<button class="hf-clear" onclick="clearFilters()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Clear</button>`;
  bar.innerHTML=html;
  bar.classList.add('show');
}

function clearFilters(){
  document.querySelectorAll('#hFilterBar select').forEach(s=>s.value='');
  document.querySelectorAll('#hFilterBar input[type=number]').forEach(i=>i.value='');
  loadItems();
}

const CAT_ICONS={all:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>',mobile:'📱',laptop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>',tv:'📺',gaming:'🎮',audio:'🎧',camera:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
furniture:'🛋️',appliances:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',kitchen:'🍳',garden:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>',mens:'👔',womens:'👗',shoes:'👟',
bags:'👜',watches:'⌚',toys:'🧸',baby:'🍼',sports:'⚽',bikes:'🚲',books:'📚',pets:'🐾',free:'🎁',other:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'};

async function loadItems(){
  const q=document.getElementById('clSearch')?.value.trim()||'';
  const em=document.getElementById('fEmirate')?.value||'';
  const area=document.getElementById('fArea')?.value||'';
  const cond=document.getElementById('fCondition')?.value||'';
  const pMin=document.getElementById('fPriceMin')?.value||'';
  const pMax=document.getElementById('fPriceMax')?.value||'';

  let url=`${SB}/rest/v1/listings?select=*&category=eq.classifieds&order=plan.desc,created_at.desc`;
  if(activeCat!=='all') url+=`&sub_category=eq.${activeCat}`;
  if(em) url+=`&emirate=eq.${encodeURIComponent(em)}`;
  if(area) url+=`&area=eq.${encodeURIComponent(area)}`;
  if(cond) url+=`&condition=eq.${encodeURIComponent(cond)}`;
  if(pMin) url+=`&price=gte.${pMin}`;
  if(pMax) url+=`&price=lte.${pMax}`;
  if(q) url+=`&title=ilike.%25${encodeURIComponent(q)}%25`;

  const r=await fetch(url,{headers:H});
  let data=await r.json();
  if(!Array.isArray(data))data=[];

  const cnt=document.getElementById('clCount');
  const grid=document.getElementById('clGrid');
  const catName=document.querySelector('.cs-item.active')?.textContent.trim()||'All Classifieds';
  cnt.innerHTML=`<strong>${data.length}</strong> ${catName} found`;

  if(data.length===0){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px 20px">
      <div style="font-size:44px;margin-bottom:14px">${CAT_ICONS[activeCat]||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'}</div>
      <div style="font-size:15px;color:#555;margin-bottom:8px">No listings found</div>
      <div style="font-size:12px;color:#333;margin-bottom:20px">Be the first to post in this category!</div>
      <a href="post.html" class="btn btn-gold">+ Post Free</a></div>`;
    return;
  }

    grid.innerHTML=data.map(function(it){
    var icon=CAT_ICONS[it.sub_category]||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>';
    var isPrem=it.plan==='premium', isFeat=it.plan==='featured';
    var tierCls=isPrem?'is-premium':isFeat?'is-featured':'';
    var crown=isPrem?'<div class="lc-crown prem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Premium</div>':isFeat?'<div class="lc-crown feat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Featured</div>':'';
    var img=it.images&&it.images[0]?'<img src="'+it.images[0]+'" loading="lazy">':icon;
    var cond=it.condition==='New'?'<span class="lc-cond new">NEW</span>':it.condition?'<span class="lc-cond used">'+it.condition+'</span>':'';
    var freeTag=(!it.price||it.price==0)?'<span class="lc-free">FREE</span>':'';
    var price=(!it.price||it.price==0)?'Free':'AED '+Number(it.price).toLocaleString();
    var phone=it.contact_phone||'';
    return '<div class="lc '+tierCls+'" onclick="window.location.href=\'listing.html?id='+it.id+'\'">'+
      '<div class="lc-img">'+img+crown+cond+freeTag+'</div>'+
      '<div class="lc-body">'+
      '<div class="lc-title">'+it.title+'</div>'+
      '<div class="lc-loc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> '+[it.area,it.emirate].filter(Boolean).join(', ')+'</div>'+
      '<div class="lc-foot"><span class="lc-price">'+price+'</span>'+
      '<a href="tel:'+phone+'" class="lc-call" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg> Call</a>'+
      '</div></div></div>';
  }).join('');
}

document.addEventListener('DOMContentLoaded',()=>loadItems());
</script>
<script src="../shared/theme.js"></script>
<script>
(function(){
  function checkAuthState(){
    var user=localStorage.getItem('gb_user');
    var guest=document.getElementById('navGuest');
    var navUser=document.getElementById('navUser');
    var nameEl=document.getElementById('navUserName');
    if(user){try{
      var u=JSON.parse(user);
      var name=(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0]||'Account';
      if(nameEl)nameEl.textContent='Hi, '+name.split(' ')[0];
      if(guest)guest.style.display='none';
      if(navUser)navUser.style.display='flex';
    }catch(e){}}
    else{if(guest)guest.style.display='flex';if(navUser)navUser.style.display='none';}
  }
  function doSignout(){localStorage.removeItem('gb_token');localStorage.removeItem('gb_user');checkAuthState();}
  window.doSignout=doSignout;
  document.addEventListener('DOMContentLoaded',checkAuthState);
})();
</script>
