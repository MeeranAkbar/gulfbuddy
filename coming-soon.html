<!DOCTYPE html>
<html lang="en">
<head>
<script src="/shared/preview-guard.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coming Soon — GulfHabibi UAE</title>
<link rel="stylesheet" href="shared/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{background:#ffffff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.cs-box{max-width:500px;width:100%}
.cs-icon{font-size:64px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.cs-badge{display:inline-block;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:#C9A84C;font-size:11px;font-weight:700;padding:5px 16px;border-radius:20px;margin-bottom:20px;letter-spacing:.8px;text-transform:uppercase}
.cs-title{font-size:clamp(28px,5vw,46px);font-weight:800;color:#111;line-height:1.1;margin-bottom:12px}
.cs-title span{color:#C9A84C}
.cs-sub{font-size:14px;color:#555;line-height:1.7;margin-bottom:32px;max-width:380px;margin-left:auto;margin-right:auto}
.cs-home{display:inline-flex;align-items:center;gap:8px;background:#C9A84C;border:none;border-radius:10px;color:#000;font-size:13px;font-weight:700;padding:12px 24px;cursor:pointer;text-decoration:none;font-family:inherit;transition:background .2s}
.cs-home:hover{background:#E8C97A}
.cs-other{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:28px}
.cs-other a{background:#ffffff;border:1px solid #e5e5e5;border-radius:9px;color:#555;font-size:12px;padding:9px 16px;text-decoration:none;transition:all .2s}
.cs-other a:hover{border-color:rgba(201,168,76,.3);color:#C9A84C}
</style>
</head>
<body>
<div class="cs-box">
  <div class="cs-icon" id="csIcon">🚀</div>
  <div class="cs-badge">Coming Soon</div>
  <h1 class="cs-title"><span id="csSection">This Section</span><br>is launching soon</h1>
  <p class="cs-sub" id="csSub">We're putting the finishing touches on this section. Check back soon — it'll be worth the wait.</p>
  <a href="home.html" class="cs-home">← Back to GulfHabibi</a>
  <div class="cs-other">
    <a href="property/index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Property</a>
    <a href="jobs/index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg> Jobs</a>
    
  </div>
</div>
<script>
// Read section from URL param
const p=new URLSearchParams(location.search);
const sec=p.get('section')||'';
const map={
  motors:{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',title:'Motors',sub:'Buy and sell cars, bikes, trucks and more across UAE. Coming very soon.'},
  jobs:{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',title:'Jobs',sub:'Find your next role or hire top talent in UAE. Launching soon.'},
  classifieds:{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>',title:'Classifieds',sub:'Buy and sell electronics, furniture, fashion and more. Launching soon.'},
  services:{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',title:'Services',sub:'Book trusted AC, cleaning, plumbing and handyman services. Launching soon.'},
  directory:{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',title:'Business Directory',sub:'Find trusted UAE businesses by area and industry. Launching soon.'},
};
if(map[sec]){
  document.getElementById('csIcon').textContent=map[sec].icon;
  document.getElementById('csSection').textContent=map[sec].title;
  document.getElementById('csSub').textContent=map[sec].sub;
  document.title=map[sec].title+' — Coming Soon | GulfHabibi';
}
</script>
</body>
</html>
