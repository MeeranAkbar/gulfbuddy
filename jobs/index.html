let activeIndustry='all';

function updateArea(){
  const em=document.getElementById('fEmirate')?.value;
  const sel=document.getElementById('fArea');
  if(!sel)return;
  sel.innerHTML='<option value="">All Areas</option>';
  (AREAS[em]||[]).forEach(a=>sel.innerHTML+=`<option>${a}</option>`);
}

function selectIndustry(btn,industry,label){
  document.querySelectorAll('.js-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeIndustry=industry;
  buildFilterBar(industry,label);
  loadJobs();
}

function buildFilterBar(industry,label){
  const bar=document.getElementById('hFilterBar');
  if(industry==='all'){bar.classList.remove('show');bar.innerHTML='';return;}

  let html='';

  // Emirate — always first
  html+=`<div class="hf"><div class="hf-lbl">Emirate</div>
    <select class="hf-sel" id="fEmirate" onchange="updateArea();loadJobs()">
      <option value="">All UAE</option>
      <option>Dubai</option><option>Abu Dhabi</option><option>Sharjah</option>
      <option>Ajman</option><option>RAK</option><option>Fujairah</option>
    </select></div>`;

  // Area — always second
  html+=`<div class="hf"><div class="hf-lbl">Area</div>
    <select class="hf-sel" id="fArea" onchange="loadJobs()" style="min-width:120px">
      <option value="">All Areas</option>
    </select></div>`;

  // Job type
  html+=`<div class="hf"><div class="hf-lbl">Job Type</div>
    <select class="hf-sel" id="fType" onchange="loadJobs()">
      <option value="">Any Type</option>
      <option value="fulltime">Full Time</option>
      <option value="parttime">Part Time</option>
      <option value="contract">Contract</option>
      <option value="freelance">Freelance</option>
      <option value="internship">Internship</option>
    </select></div>`;

  // Experience
  html+=`<div class="hf"><div class="hf-lbl">Experience</div>
    <select class="hf-sel" id="fExp" onchange="loadJobs()">
      <option value="">Any Level</option>
      <option value="entry">Entry (0-2 yrs)</option>
      <option value="mid">Mid (2-5 yrs)</option>
      <option value="senior">Senior (5+ yrs)</option>
      <option value="manager">Manager / Director</option>
    </select></div>`;

  // Salary range
  html+=`<div class="hf"><div class="hf-lbl">Salary / Month (AED)</div>
    <div class="hf-range">
      <input class="hf-num" type="number" id="fSalMin" placeholder="0" oninput="loadJobs()">
      <span class="hf-dash">—</span>
      <input class="hf-num" type="number" id="fSalMax" placeholder="Max" oninput="loadJobs()">
    </div></div>`;

  html+=`<button class="hf-clear" onclick="clearFilters()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Clear</button>`;
  bar.innerHTML=html;
  bar.classList.add('show');
}

function clearFilters(){
  document.querySelectorAll('#hFilterBar select').forEach(s=>s.value='');
  document.querySelectorAll('#hFilterBar input[type=number]').forEach(i=>i.value='');
  loadJobs();
}

function ago(d){const x=Math.floor((Date.now()-new Date(d))/86400000);return x===0?'Today':x===1?'Yesterday':x<7?x+'d ago':Math.floor(x/7)+'w ago';}

async function loadJobs(){
  const q=document.getElementById('jSearch')?.value.trim()||'';
  const em=document.getElementById('fEmirate')?.value||'';
  const area=document.getElementById('fArea')?.value||'';
  const type=document.getElementById('fType')?.value||'';
  const exp=document.getElementById('fExp')?.value||'';
  const salMin=document.getElementById('fSalMin')?.value||'';
  const salMax=document.getElementById('fSalMax')?.value||'';

  let url=`${SB}/rest/v1/jobs?select=*&order=created_at.desc`;
  if(activeIndustry!=='all') url+=`&category=eq.${activeIndustry}`;
  if(em) url+=`&emirate=eq.${encodeURIComponent(em)}`;
  if(area) url+=`&area=eq.${encodeURIComponent(area)}`;
  if(type) url+=`&job_type=eq.${encodeURIComponent(type)}`;
  if(exp) url+=`&experience=eq.${encodeURIComponent(exp)}`;
  if(salMin) url+=`&salary_min=gte.${salMin}`;
  if(salMax) url+=`&salary_max=lte.${salMax}`;
  if(q) url+=`&title=ilike.%25${encodeURIComponent(q)}%25`;

  const r=await fetch(url,{headers:H});
  let data=await r.json();
  if(!Array.isArray(data))data=[];

  const cnt=document.getElementById('jCount');
  const list=document.getElementById('jList');
  const indName=document.querySelector('.js-item.active')?.textContent.trim()||'All Jobs';
  cnt.innerHTML=`<strong>${data.length}</strong> ${indName} found`;

  if(data.length===0){
    list.innerHTML=`<div style="text-align:center;padding:60px 20px">
      <div style="font-size:44px;margin-bottom:14px">${IND_ICONS[activeIndustry]||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>'}</div>
      <div style="font-size:15px;color:#555;margin-bottom:8px">No jobs found</div>
      <div style="font-size:12px;color:#333;margin-bottom:20px">Be the first to post a job in this industry!</div>
      <a href="post.html" class="btn btn-gold">+ Post a Job Free</a></div>`;
    return;
  }

  list.innerHTML=data.map(j=>`
    <div class="jc${j.is_featured?' featured':''}">
      <div class="jc-logo">${IND_ICONS[j.category]||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>'}</div>
      <div class="jc-info">
        <div class="jc-title">${j.title}${j.is_featured?' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>':''}</div>
        <div class="jc-company">${j.company||'Company'} · ${[j.area,j.emirate].filter(Boolean).join(', ')}</div>
        <div class="jc-tags">
          ${j.job_type?`<span class="jc-tag type">${j.job_type}</span>`:''}
          ${j.experience?`<span class="jc-tag">${j.experience}</span>`:''}
          ${j.salary_min?`<span class="jc-tag salary">AED ${Number(j.salary_min).toLocaleString()}${j.salary_max?' – '+Number(j.salary_max).toLocaleString():''}/mo</span>`:''}
        </div>
        <div class="jc-meta">
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${j.emirate||'UAE'}</span>
          ${j.openings?`<span>👥 ${j.openings} opening${j.openings>1?'s':''}</span>`:''}
          <span>${ago(j.created_at)}</span>
        </div>
      </div>
      <div class="jc-right">
        <div class="jc-date">${ago(j.created_at)}</div>
        <a href="tel:${j.contact_phone}" class="jc-apply" onclick="event.stopPropagation()">Apply</a>
      </div>
    </div>`).join('');
}

document.addEventListener('DOMContentLoaded',()=>loadJobs());

  window.doSignout=doSignout;
  document.addEventListener('DOMContentLoaded',checkAuthState);
})();

  btn.classList.add('active');
  activeIndustry=industry;
  buildFilterBar(industry);
  loadJobs();
}

function buildFilterBar(industry){
  const bar=document.getElementById('hFilterBar');
  if(!industry){bar.classList.remove('show');bar.innerHTML='';return;}

  let html='';

  // EMIRATE — always first
  html+=`<div class="hf">
    <div class="hf-lbl">Emirate</div>
    <select class="hf-sel" id="fEmirate" onchange="updateArea();loadJobs()">
      <option value="">All UAE</option>
      <option>Dubai</option><option>Abu Dhabi</option><option>Sharjah</option>
      <option>Ajman</option><option>RAK</option><option>Fujairah</option>
    </select>
  </div>`;

  // AREA — always second
  html+=`<div class="hf">
    <div class="hf-lbl">Area</div>
    <select class="hf-sel" id="fArea" onchange="loadJobs()" style="min-width:120px">
      <option value="">All Areas</option>
    </select>
  </div>`;

  // JOB TYPE
  html+=`<div class="hf">
    <div class="hf-lbl">Job Type</div>
    <select class="hf-sel" id="fType" onchange="loadJobs()">
      <option value="">Any Type</option>
      <option>Full Time</option>
      <option>Part Time</option>
      <option>Contract</option>
      <option>Freelance</option>
      <option>Internship</option>
    </select>
  </div>`;

  // EXPERIENCE
  html+=`<div class="hf">
    <div class="hf-lbl">Experience</div>
    <select class="hf-sel" id="fExp" onchange="loadJobs()">
      <option value="">Any Level</option>
      <option>Entry Level</option>
      <option>Mid Level</option>
      <option>Senior</option>
      <option>Manager</option>
      <option>Director</option>
    </select>
  </div>`;

  // SALARY range
  html+=`<div class="hf">
    <div class="hf-lbl">Salary/mo (AED)</div>
    <div class="hf-range">
      <input class="hf-num" type="number" id="fSalMin" placeholder="0" oninput="loadJobs()">
      <span class="hf-dash">—</span>
      <input class="hf-num" type="number" id="fSalMax" placeholder="Max" oninput="loadJobs()">
    </div>
  </div>`;

  html+=`<button class="hf-clear" onclick="clearFilters()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Clear</button>`;
  bar.innerHTML=html;
  bar.classList.add('show');
}

function updateArea(){
  const em=document.getElementById('fEmirate')?.value;
  const sel=document.getElementById('fArea');
  if(!sel)return;
  sel.innerHTML='<option value="">All Areas</option>';
  (AREAS[em]||[]).forEach(a=>sel.innerHTML+=`<option>${a}</option>`);
}

function clearFilters(){
  document.querySelectorAll('#hFilterBar select').forEach(s=>s.value='');
  document.querySelectorAll('#hFilterBar input[type=number]').forEach(i=>i.value='');
  loadJobs();
}

function timeAgo(d){
  const x=Math.floor((Date.now()-new Date(d))/86400000);
  return x===0?'Today':x===1?'Yesterday':x<7?x+'d ago':Math.floor(x/7)+'w ago';
}

async function loadJobs(){
  const q=document.getElementById('jSearch')?.value.trim()||'';
  const em=document.getElementById('fEmirate')?.value||'';
  const area=document.getElementById('fArea')?.value||'';
  const type=document.getElementById('fType')?.value||'';
  const exp=document.getElementById('fExp')?.value||'';
  const salMin=document.getElementById('fSalMin')?.value||'';
  const salMax=document.getElementById('fSalMax')?.value||'';

  let url=`${SB}/rest/v1/jobs?select=*&order=created_at.desc`;
  if(activeIndustry) url+=`&industry=eq.${activeIndustry}`;
  if(em) url+=`&emirate=eq.${encodeURIComponent(em)}`;
  if(area) url+=`&area=eq.${encodeURIComponent(area)}`;
  if(type) url+=`&job_type=eq.${encodeURIComponent(type)}`;
  if(exp) url+=`&experience=eq.${encodeURIComponent(exp)}`;
  if(salMin) url+=`&salary_min=gte.${salMin}`;
  if(salMax) url+=`&salary_max=lte.${salMax}`;
  if(q) url+=`&title=ilike.%25${encodeURIComponent(q)}%25`;

  const r=await fetch(url,{headers:H});
  let data=await r.json();
  if(!Array.isArray(data))data=[];

  const cnt=document.getElementById('jCount');
  const list=document.getElementById('jList');
  const indName=document.querySelector('.js-item.active')?.textContent.trim()||'All Jobs';
  cnt.innerHTML=`<strong>${data.length}</strong> ${indName} found`;

  if(data.length===0){
    list.innerHTML=`<div style="text-align:center;padding:60px 20px">
      <div style="font-size:44px;margin-bottom:14px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
      <div style="font-size:15px;color:#555;margin-bottom:8px">No jobs found</div>
      <div style="font-size:12px;color:#333;margin-bottom:20px">Try different filters or post a job!</div>
      <a href="post.html" class="btn btn-gold">+ Post a Job Free</a>
    </div>`;
    return;
  }

  list.innerHTML=data.map(j=>`
    <div class="job-card${j.is_featured?' featured':''}" onclick="window.location.href='listing.html?id=${j.id}'">`
      <div class="jc-logo">${ICONS[j.industry]||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>'}</div>
      <div class="jc-info">
        <div class="jc-title">${j.title}${j.is_featured?' <span style="background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:20px;font-size:9px;color:#C9A84C;padding:2px 7px;margin-left:6px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Featured</span>':''}</div>
        <div class="jc-company">${j.company||'Company'}${j.area?' · '+j.area:j.emirate?' · '+j.emirate:''}</div>
        <div class="jc-tags">
          ${j.job_type?`<span class="jc-tag type">${j.job_type}</span>`:''}
          ${j.experience?`<span class="jc-tag">${j.experience}</span>`:''}
          ${j.salary_min?`<span class="jc-tag salary">AED ${Number(j.salary_min).toLocaleString()}${j.salary_max?' — '+Number(j.salary_max).toLocaleString():''}/mo</span>`:''}
        </div>
        <div class="jc-meta">
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${j.emirate||''}</span>
          ${j.openings?`<span>👥 ${j.openings} opening${j.openings>1?'s':''}</span>`:''}
          <span>${timeAgo(j.created_at)}</span>
        </div>
      </div>
      <div class="jc-right">
        <div class="jc-date">${timeAgo(j.created_at)}</div>
        <button class="jc-apply" onclick="event.stopPropagation()">Apply <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
      </div>
    </div>`).join('');
}

document.addEventListener('DOMContentLoaded',()=>loadJobs());
</script>
</body>
</html>
