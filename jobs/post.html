<div class="post-wrap">
  <div style="font-size:22px;font-weight:600;margin-bottom:4px">Post a Job</div>
  <div style="font-size:13px;color:var(--text-dim);margin-bottom:20px">Free to post. Goes live instantly.</div>

  <div class="section-title">Job Details</div>
  <div class="form-group">
    <label class="form-label">Job Title *</label>
    <input type="text" class="form-input" id="title" placeholder="e.g. Senior Accountant, Delivery Driver, Nurse">
  </div>
  <div class="two-col">
    <div class="form-group">
      <label class="form-label">Company Name *</label>
      <input type="text" class="form-input" id="company" placeholder="Your company name">
    </div>
    <div class="form-group">
      <label class="form-label">Category *</label>
      <select class="form-input" id="category"></select>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Job Description *</label>
    <textarea class="form-input" id="description" rows="4" placeholder="Describe the role, responsibilities and what you offer..."></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">Requirements</label>
    <textarea class="form-input" id="requirements" rows="3" placeholder="Education, experience, skills required..."></textarea>
  </div>

  <div class="section-title">Job Type & Experience</div>
  <div class="three-col">
    <div class="form-group">
      <label class="form-label">Job Type</label>
      <select class="form-input" id="jobType">
        <option value="fulltime">Full Time</option>
        <option value="parttime">Part Time</option>
        <option value="contract">Contract</option>
        <option value="freelance">Freelance</option>
        <option value="internship">Internship</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Experience Level</label>
      <select class="form-input" id="experience">
        <option value="">Any</option>
        <option value="entry">Entry (0-2 yrs)</option>
        <option value="mid">Mid (2-5 yrs)</option>
        <option value="senior">Senior (5+ yrs)</option>
        <option value="manager">Manager/Director</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">No. of Openings</label>
      <input type="number" class="form-input" id="openings" value="1" min="1">
    </div>
  </div>

  <div class="section-title">Salary</div>
  <div class="two-col">
    <div class="form-group">
      <label class="form-label">Salary From (AED/month)</label>
      <input type="number" class="form-input" id="salaryMin" placeholder="e.g. 3000">
    </div>
    <div class="form-group">
      <label class="form-label">Salary To (AED/month)</label>
      <input type="number" class="form-input" id="salaryMax" placeholder="e.g. 6000">
    </div>
  </div>

  <div class="section-title">Candidate Preference</div>
  <div class="two-col">
    <div class="form-group">
      <label class="form-label">Nationality Preference</label>
      <input type="text" class="form-input" id="nationality" placeholder="e.g. Any, Filipino, Indian">
    </div>
    <div class="form-group">
      <label class="form-label">Gender</label>
      <select class="form-input" id="gender">
        <option value="any">Any</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>
  </div>

  <div class="section-title">Location</div>
  <div class="two-col">
    <div class="form-group">
      <label class="form-label">Emirate *</label>
      <select class="form-input" id="emirate"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Area</label>
      <input type="text" class="form-input" id="area" placeholder="e.g. Business Bay, JLT, DIFC">
    </div>
  </div>

  <div class="section-title">Contact</div>
  <div class="three-col">
    <div class="form-group">
      <label class="form-label">Phone *</label>
      <input type="tel" class="form-input" id="phone" placeholder="+971 4 000 0000">
    </div>
    <div class="form-group">
      <label class="form-label">WhatsApp</label>
      <input type="tel" class="form-input" id="whatsapp" placeholder="+971 50 000 0000">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="email" placeholder="hr@company.com">
    </div>
  </div>

  <button class="btn btn-gold" style="width:100%;padding:13px;font-size:15px;margin-top:8px" onclick="submitJob()" id="submitBtn">
    Post Job Free
  </button>
  <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:8px">Your job goes live instantly. Free forever.</p>
</div>

<script>



const INDUSTRIES = [
  {value:'construction', label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M2 20h20"/><path d="M6 20V10l6-7 6 7v10"/><path d="M9 20v-5h6v5"/></svg> Construction & Real Estate'},
  {value:'realestate',   label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Real Estate'},
  {value:'it',           label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg> IT & Technology'},
  {value:'medical',      label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Healthcare & Medical'},
  {value:'education',    label:'📚 Education & Training'},
  {value:'hospitality',  label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg> Hospitality & Food'},
  {value:'automotive',   label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Automotive'},
  {value:'finance',      label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg> Finance & Banking'},
  {value:'retail',       label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg> Retail & Sales'},
  {value:'engineering',  label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Engineering'},
  {value:'logistics',    label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Logistics & Warehouse'},
  {value:'creative',     label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M18.37 2.63 14 7l-1.59-1.59a2 2 0 0 0-2.82 0L8 7l9 9 1.59-1.59a2 2 0 0 0 0-2.82L17 10l4.37-4.37a2.12 2.12 0 1 0-3-3Z"/><path d="M9 8c-2 3-4 3.5-7 4l8 10c2-1 6-5 6-7"/></svg> Creative & Design'},
  {value:'admin',        label:'👔 Admin & HR'},
  {value:'legal',        label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Legal & Compliance'},
  {value:'labour',       label:'👷 Labour & Manual Work'},
  {value:'other',        label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;flex-shrink:0"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> Other'},
];

const catEl = document.getElementById('category');
catEl.innerHTML = '<option value="">Select industry *</option>';
INDUSTRIES.forEach(ind => { const o=document.createElement('option'); o.value=ind.value; o.textContent=ind.label; catEl.appendChild(o); });

// Populate emirate select
const emSel = document.getElementById('emirate');
emSel.innerHTML = '<option value="">Select emirate *</option>';
['Dubai','Abu Dhabi','Sharjah','Ajman','RAK','Fujairah','UAQ'].forEach(em=>{
  const o=document.createElement('option'); o.value=em; o.textContent=em; emSel.appendChild(o);
});




async function submitJob() {
  const SB_URL = 'https://chfkssclmdshdcijfzdr.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZmtzc2NsbWRzaGRjaWpmemRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODc2ODUsImV4cCI6MjA4OTE2MzY4NX0.cbJBIgeDRIqFvk3WMmxRoDWo1C73wM44oBDekdcc3sE';
  const title    = document.getElementById('title').value.trim();
  const company  = document.getElementById('company').value.trim();
  const category = document.getElementById('category').value;
  const desc     = document.getElementById('description').value.trim();
  const phone    = document.getElementById('phone').value.trim();
  const emirate  = document.getElementById('emirate').value;
  if (!title||!company||!category||!desc||!phone||!emirate) {
    showJobMsg('Please fill all required fields','error'); return;
  }
  const btn = document.getElementById('submitBtn');
  btn.textContent='Posting...'; btn.disabled=true;

  const job = {
    title, company, category, description: desc,
    requirements: document.getElementById('requirements').value,
    job_type:     document.getElementById('jobType').value,
    experience:   document.getElementById('experience').value,
    openings:     parseInt(document.getElementById('openings').value)||1,
    salary_min:   document.getElementById('salaryMin').value||null,
    salary_max:   document.getElementById('salaryMax').value||null,
    nationality:  document.getElementById('nationality').value,
    gender:       document.getElementById('gender').value,
    emirate,
    area:         document.getElementById('area').value,
    contact_phone:    phone,
    contact_whatsapp: document.getElementById('whatsapp').value,
    contact_email:    document.getElementById('email').value
  };

  // Sanitise inputs
  if(window.GBSanitise){
    job.title=GBSanitise.text(job.title,120);
    job.description=GBSanitise.text(job.description,2000);
    job.requirements=GBSanitise.text(job.requirements,1000);
    const ph=GBSanitise.phone(phone);
    if(!ph.valid){showJobMsg(ph.error,'error');btn.textContent='Post Job Free';btn.disabled=false;return;}
    job.contact_phone=ph.cleaned;
  }
  // Trust check
  if(window.GBTrust){
    const trust=await GBTrust.fullCheck(job,{supaUrl:SB_URL,supaKey:SB_KEY,skipAI:false});
    if(!trust.allowed){showJobMsg(trust.message,'error');btn.textContent='Post Job Free';btn.disabled=false;return;}
    if(trust.holdForReview) job.status='pending';
  }
  const r = await fetch(`${SB_URL}/rest/v1/jobs`, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'},
    body: JSON.stringify(job)
  });
  if (r.ok || r.status===201) {
    let gbRef='';try{const d=await r.json();gbRef=d?.[0]?.gb_ref||'';}catch(e){}
    const refMsg=gbRef?' Ref: <strong style="color:#22c55e">'+gbRef+'</strong>':'';
    showJobMsg('Job posted!'+refMsg+' Redirecting...','success');
    setTimeout(()=>window.location.href='index.html',2500);
  } else {
    const err = await r.json().catch(()=>({}));
    showJobMsg('Error: '+(err.message||'Try again'),'error');
    btn.textContent='Post Job Free'; btn.disabled=false;
  }
}

function showJobMsg(msg,type){
  let t=document.getElementById('jobMsg');
  if(!t){t=document.createElement('div');t.id='jobMsg';document.body.appendChild(t);}
  t.style.cssText=`position:fixed;bottom:24px;right:24px;background:${type==='success'?'#0d2a0d':'#2a0d0d'};border:1px solid ${type==='success'?'#22c55e':'#ef4444'};color:${type==='success'?'#22c55e':'#ef4444'};border-radius:8px;padding:10px 18px;font-size:13px;z-index:9999`;
  t.textContent=msg;setTimeout(()=>t.remove(),3000);
}

function showToast(msg,type){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
<script src="../shared/theme.js"></script>
<script>
(function(){
  function checkAuthState(){
    var user=localStorage.getItem('gb_user');
    var guest=document.getElementById('navGuest');
    var navUser=document.getElementById('navUser');
    var nameEl=document.getElementById('navUserName');
    if(user){try{
      var u=JSON.parse(user);
      var name=(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0]||'Account';
      if(nameEl)nameEl.textContent='Hi, '+name.split(' ')[0];
      if(guest)guest.style.display='none';
      if(navUser)navUser.style.display='flex';
    }catch(e){}}
    else{if(guest)guest.style.display='flex';if(navUser)navUser.style.display='none';}
  }
  function doSignout(){localStorage.removeItem('gb_token');localStorage.removeItem('gb_user');checkAuthState();}
  window.doSignout=doSignout;
  document.addEventListener('DOMContentLoaded',checkAuthState);
})();
</script>
